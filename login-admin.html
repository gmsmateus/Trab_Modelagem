<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BurguerFlow - Login Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/font-family.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="estilo.css">
    <style>
        .wrapper-login {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f8f9fa;
        }
        .card-login {
            width: 100%;
            max-width: 380px;
        }
    </style>
</head>
<body>

    <div class="wrapper-login">
        <div class="card card-sistema p-4 shadow-sm card-login text-center">
            <div class="mb-4">
                <div class="display-5 text-dark mb-2">
                    <i class="bi bi-shield-lock-fill text-secondary"></i>
                </div>
                <h4 class="fw-bold m-0">Acesso Restrito</h4>
                <p class="text-muted small mt-1">Digite qualquer senha para acessar o painel gerenciador.</p>
            </div>

            <div class="mb-3 text-start">
                <label class="form-label small fw-bold">Usuário</label>
                <input type="text" class="form-control" value="Gerente" readonly>
            </div>
            
            <div class="mb-4 text-start">
                <label class="form-label small fw-bold">Senha de Gerência</label>
                <input type="password" id="senhaInput" class="form-control text-center py-2" placeholder="••••••••" autofocus>
                <div class="invalid-feedback small text-center mt-1">
                    Por favor, insira uma senha para continuar.
                </div>
            </div>

            <div class="d-grid gap-2">
                <button type="button" class="btn btn-verde py-2 fw-bold text-dark" onclick="autenticarEEntrar()">
                    <i class="bi bi-box-arrow-in-right"></i> Confirmar Acesso
                </button>
                <a href="dashboard.html" class="btn btn-outline-secondary btn-sm py-2">
                    Voltar ao Dashboard
                </a>
            </div>
        </div>
    </div>

    <script>
        const senhaInput = document.getElementById('senhaInput');

        function autenticarEEntrar() {
            const senha = senhaInput.value;
            if (senha.trim() !== "") {
                window.location.href = "admin.html";
            } else {
                // Adiciona o comportamento visual de erro do Bootstrap
                senhaInput.classList.add('is-invalid');
                senhaInput.focus();
            }
        }

        // Remove a borda vermelha de erro assim que o usuário volta a digitar
        senhaInput.addEventListener('input', function() {
            if (this.classList.contains('is-invalid')) {
                this.classList.remove('is-invalid');
            }
        });

        // Atalho para o botão Enter
        senhaInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') autenticarEEntrar();
        });
    </script>
</body>
</html>
