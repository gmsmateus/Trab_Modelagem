<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>BurguerFlow - Cozinha</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="estilo.css">
</head>
<body class="bg-dark text-white"> 
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>👨‍🍳 Painel da Cozinha</h1>
            <a href="index.html" class="btn btn-outline-light">Sair</a>
        </div>

        <div class="row g-3">
            <div class="col-md-6">
                <div class="card bg-secondary text-white shadow card-sistema">
                    <div class="card-header d-flex justify-content-between">
                        <strong>Mesa 01</strong>
                        <span class="badge bg-warning text-dark">Pendente</span>
                    </div>
                    <div class="card-body">
                        <p class="mb-1"><strong>1x X-Tudo</strong></p>
                        <p class="small">Obs: Sem maionese e carne bem passada.</p>
                        <hr>
                        <p class="mb-1"><strong>1x Batata M</strong></p>
                        
                        <button class="btn btn-success btn-perfil w-100 mt-3">Marcar como Pronto</button>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card bg-secondary text-white shadow card-sistema">
                    <div class="card-header d-flex justify-content-between">
                        <strong>Mesa 04</strong>
                        <span class="badge bg-warning text-dark">Pendente</span>
                    </div>
                    <div class="card-body">
                        <p class="mb-1"><strong>2x X-Burger</strong></p>
                        <p class="small">Obs: Tirar o picles de um deles.</p>
                        
                        <button class="btn btn-success btn-perfil w-100 mt-3">Marcar como Pronto</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
