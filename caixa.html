<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>BurguerFlow - Caixa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="estilo.css">
</head>
<body class="bg-light">

    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>💰 Fechamento de Caixa</h1>
            <a href="index.html" class="btn btn-outline-secondary">Sair</a>
        </div>

        <div class="card shadow-sm card-sistema">
            <div class="card-body">
                <h5 class="mb-4">Mesas Ativas</h5>
                
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>Mesa</th>
                                <th>Status</th>
                                <th>Total Acumulado</th>
                                <th>Ação</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>Mesa 01</td>
                                <td><span class="text-danger">Consumindo</span></td>
                                <td class="fw-bold">R$ 29,00</td>
                                <td><button class="btn btn-sm btn-primary btn-perfil">Ver Detalhes</button></td>
                            </tr>
                            <tr>
                                <td>Mesa 02</td>
                                <td><span class="text-success">Aguardando Conta</span></td>
                                <td class="fw-bold">R$ 115,50</td>
                                <td><button class="btn btn-sm btn-success btn-perfil">Fechar e Pagar</button></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
