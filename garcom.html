<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BurguerFlow - Pedidos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <div class="container py-4">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-journal-text"></i> Gestão de Pedidos</h2>
            <a href="index.html" class="btn btn-outline-secondary btn-sm">Voltar ao Início</a>
        </div>

        <div class="card card-sistema p-3 mb-4 shadow-sm">
            <h5 class="mb-3 text-muted">Selecione uma Mesa:</h5>
            <div class="row g-2" id="mapa-mesas">
                <div class="col-3"><button onclick="verMesa(this, '01', 'Livre')" class="btn btn-mesa btn-outline-dark w-100 py-3 btn-perfil">01</button></div>
                <div class="col-3"><button onclick="verMesa(this, '02', 'Ocupada')" class="btn btn-mesa btn-vermelho w-100 py-3 btn-perfil">02</button></div>
                <div class="col-3"><button onclick="verMesa(this, '03', 'Livre')" class="btn btn-mesa btn-outline-dark w-100 py-3 btn-perfil">03</button></div>
                <div class="col-3"><button onclick="verMesa(this, '04', 'Livre')" class="btn btn-mesa btn-outline-dark w-100 py-3 btn-perfil">04</button></div>
            </div>
        </div>

        <div id="detalhe-mesa" class="card card-sistema p-4 d-none shadow">
            <div class="d-flex justify-content-between">
                <h5>Mesa <span id="num-mesa">--</span></h5>
                <span id="status-badge" class="badge"></span>
            </div>
            <hr>

            <div id="itens-pedido" class="mb-4">
                <p class="text-muted small">Carregando detalhes do pedido...</p>
            </div>

            <div class="row g-2">
                <div class="col-6">
                    <button class="btn btn-amarelo btn-perfil w-100 py-2">
                        <i class="bi bi-plus-lg"></i> Item
                    </button>
                </div>
                <div class="col-6">
                    <button class="btn btn-verde btn-perfil w-100 py-2">
                        <i class="bi bi-check2-all"></i> Confirmar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function verMesa(elemento, num, status) {
            // FEEDBACK VISUAL NEUTRO: Destaca a mesa selecionada
            document.querySelectorAll('.btn-mesa').forEach(btn => btn.classList.remove('mesa-selecionada'));
            elemento.classList.add('mesa-selecionada');

            // LÓGICA DE EXIBIÇÃO
            document.getElementById('detalhe-mesa').classList.remove('d-none');
            document.getElementById('num-mesa').innerText = num;
            
            const badge = document.getElementById('status-badge');
            badge.innerText = status;
            badge.className = status === 'Livre' ? 'badge bg-success' : 'badge bg-danger';
            
            const itens = document.getElementById('itens-pedido');
            itens.innerHTML = status === 'Ocupada' ? 
                '<div class="alert alert-light border-0 p-0">' +
                '<strong>1x X-Burger Clássico</strong><br>' +
                '<small class="text-muted">Obs: Sem cebola.</small><br>' +
                '<strong>1x Coca-Cola 350ml</strong>' +
                '</div>' : 
                '<p class="text-muted italic">Mesa disponível para abertura de pedido.</p>';
        }
    </script>
</body>
</html>
