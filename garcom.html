<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BurguerFlow - Atendimento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <div class="container py-4">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-journal-text"></i> Gestão de Atendimento</h2>
            <a href="index.html" class="btn btn-outline-secondary btn-sm">Voltar ao Início</a>
        </div>

        <div class="card card-sistema p-3 mb-4 shadow-sm">
            <h5 class="mb-3 text-muted">Selecione uma Mesa:</h5>
            <div class="row g-2" id="mapa-mesas">
                <div class="col-3"><button onclick="verMesa(this, '01', 'Livre')" class="btn btn-mesa btn-outline-dark w-100 py-3 btn-perfil">01</button></div>
                <div class="col-3"><button onclick="verMesa(this, '02', 'Ocupada')" class="btn btn-mesa btn-vermelho w-100 py-3 btn-perfil">02</button></div>
                <div class="col-3"><button onclick="verMesa(this, '03', 'Livre')" class="btn btn-mesa btn-outline-dark w-100 py-3 btn-perfil">03</button></div>
                <div class="col-3"><button onclick="verMesa(this, '04', 'Livre')" class="btn btn-mesa btn-outline-dark w-100 py-3 btn-perfil">04</button></div>
            </div>
        </div>

        <div id="detalhe-mesa" class="card card-sistema p-4 d-none shadow">
            <div class="d-flex justify-content-between align-items-center">
                <h5>Mesa <span id="num-mesa">--</span></h5>
                <span id="status-badge" class="badge"></span>
            </div>
            <hr>

            <div id="conteudo-mesa-dinamico" class="mb-4">
            </div>

            <div id="botoes-acao-mesa" class="row g-2">
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalAdicionarItem" tabindex="-1" aria-labelledby="modalAdicionarItemLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content card-sistema">
                <div class="modal-header border-bottom-0">
                    <h5 class="modal-title fw-bold" id="modalAdicionarItemLabel"><i class="bi bi-plus-circle-fill text-warning"></i> Adicionar Item ao Atendimento</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Selecione o Produto</label>
                        <select class="form-select">
                            <option>X-Burger Clássico - R$ 24,90</option>
                            <option>X-Salada Especial - R$ 26,90</option>
                            <option>Batata Frita M - R$ 12,00</option>
                            <option>Coca-Cola 350ml - R$ 6,00</option>
                            <option>Suco Natural - R$ 8,00</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Observações de Preparo</label>
                        <textarea class="form-control" rows="2" placeholder="Ex: Sem cebola, ponto ao ponto..."></textarea>
                    </div>
                </div>
                <div class="modal-footer border-top-0">
                    <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-verde btn-sm px-3" onclick="confirmarInclusaoItem()" data-bs-dismiss="modal">Lançar Item</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalConfirmarRemocao" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content card-sistema">
                <div class="modal-body text-center pt-4">
                    <i class="bi bi-exclamation-triangle-fill text-danger fs-1 mb-3 d-block"></i>
                    <p class="mb-4">Deseja realmente remover <strong id="nome-item-remover">item</strong> desta comanda?</p>
                    <div class="d-flex justify-content-center gap-2">
                        <button type="button" class="btn btn-sm btn-outline-secondary" data-bs-dismiss="modal">Não</button>
                        <button type="button" class="btn btn-sm btn-danger px-3" id="btnConfirmarExclusao">Sim, Remover</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1060">
        <div id="toastSistema" class="toast align-items-center text-white bg-dark border-0 shadow" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body d-flex align-items-center gap-2">
                    <i class="bi bi-info-circle-fill text-warning"></i>
                    <span id="toastMensagem">Mensagem do sistema</span>
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        let mesaAtualSelecionada = "";
        let itemParaRemoverAtual = "";

        function exibirToast(mensagem) {
            document.getElementById('toastMensagem').innerText = mensagem;
            const toastElement = document.getElementById('toastSistema');
            const toast = new bootstrap.Toast(toastElement, { delay: 3500 });
            toast.show();
        }

        function verMesa(elemento, num, status) {
            mesaAtualSelecionada = num;

            document.querySelectorAll('.btn-mesa').forEach(btn => btn.classList.remove('mesa-selecionada'));
            elemento.classList.add('mesa-selecionada');

            document.getElementById('detalhe-mesa').classList.remove('d-none');
            document.getElementById('num-mesa').innerText = num;
            
            const badge = document.getElementById('status-badge');
            badge.innerText = status;
            badge.className = status === 'Livre' ? 'badge bg-success' : 'badge bg-danger';
            
            const conteudo = document.getElementById('conteudo-mesa-dinamico');
            const botoes = document.getElementById('botoes-acao-mesa');

            if (status === 'Livre') {
                conteudo.innerHTML = `<p class="text-muted italic">Esta mesa encontra-se vazia e disponível no momento.</p>`;
                botoes.innerHTML = `
                    <div class="col-12">
                        <button onclick="abrirMesaAtiva()" class="btn btn-verde btn-perfil w-100 py-2">
                            <i class="bi bi-door-open"></i> Abrir Mesa (Ocupar)
                        </button>
                    </div>
                `;
            } else {
                // REGRA DO DIAGRAMA APLICADA NA INJEÇÃO DA MESA 02:
                conteudo.innerHTML = `
                    <h6 class="text-muted mb-3">Itens Lançados na Comanda:</h6>
                    <div class="list-group gap-2">
                        
                        <div class="list-group-item d-flex justify-content-between align-items-center border-0 bg-light p-3 rounded shadow-sm">
                            <div>
                                <span class="badge bg-success me-2"><i class="bi bi-check2-all"></i> Entregue</span>
                                <strong class="text-decoration-underline text-dark">1x X-Burger Clássico</strong><br>
                                <small class="text-muted">Obs: Sem cebola.</small>
                            </div>
                            <div class="btn-group">
                                </div>
                        </div>

                        <div class="list-group-item d-flex justify-content-between align-items-center border-0 bg-light p-3 rounded shadow-sm">
                            <div>
                                <span class="badge bg-warning text-dark me-2">Em preparo</span>
                                <strong>1x Coca-Cola 350ml</strong>
                            </div>
                            <div class="btn-group">
                                <button onclick="marcarItemEntregue('Coca-Cola')" class="btn btn-sm btn-outline-success" title="Marcar como entregue na mesa"><i class="bi bi-check-lg"></i></button>
                                <button onclick="solicitarRemocaoItem('Coca-Cola')" class="btn btn-sm btn-outline-danger" title="Remover item/Pedido errado"><i class="bi bi-x-lg"></i></button>
                            </div>
                        </div>
                    </div>
                `;
                botoes.innerHTML = `
                    <div class="col-6">
                        <button class="btn btn-amarelo btn-perfil w-100 py-2" data-bs-toggle="modal" data-bs-target="#modalAdicionarItem">
                            <i class="bi bi-plus-lg"></i> Adicionar Item
                        </button>
                    </div>
                    <div class="col-6">
                        <button onclick="exibirToast('Lançamentos da mesa salvos e sincronizados!')" class="btn btn-outline-dark btn-perfil w-100 py-2">
                            <i class="bi bi-check2-all"></i> Confirmar Tudo
                        </button>
                    </div>
                `;
            }
        }

        function abrirMesaAtiva() {
            exibirToast(`Mesa ${mesaAtualSelecionada} aberta com sucesso! Lançamentos liberados.`);
            document.getElementById('status-badge').innerText = 'Ocupada';
            document.getElementById('status-badge').className = 'badge bg-danger';
            verMesa(document.querySelector('.mesa-selecionada'), mesaAtualSelecionada, 'Ocupada');
        }

        function confirmarInclusaoItem() {
            exibirToast('Uma unidade adicionada temporariamente! Confirme as alterações para salvar.');
        }

        function marcarItemEntregue(nomeItem) {
            exibirToast(`Status de "${nomeItem}" alterado para: Entregue!`);
        }

        function solicitarRemocaoItem(nomeItem) {
            itemParaRemoverAtual = nomeItem;
            document.getElementById('nome-item-remover').innerText = `"${nomeItem}"`;
            
            const modalElement = document.getElementById('modalConfirmarRemocao');
            const modal = new bootstrap.Modal(modalElement);
            modal.show();
        }

        document.getElementById('btnConfirmarExclusao').addEventListener('click', function() {
            const modalElement = document.getElementById('modalConfirmarRemocao');
            const modal = bootstrap.Modal.getInstance(modalElement);
            modal.hide();
            
            exibirToast(`O item "${itemParaRemoverAtual}" foi removido com sucesso.`);
        });
    </script>
</body>
</html>
