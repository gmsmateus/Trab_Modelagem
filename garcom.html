<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>BurguerFlow - Atendimento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <div class="container py-4">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Área do Garçom</h2>
            <a href="index.html" class="btn btn-outline-secondary btn-sm">Sair</a>
        </div>

        <div class="card card-sistema p-3 mb-4">
            <h5 class="mb-3">Mapa de Mesas</h5>
            <div class="row g-2">
                <div class="col-3"><button onclick="verMesa(this, '01', 'Livre')" class="btn btn-mesa btn-outline-dark w-100 py-3 btn-perfil">01</button></div>
                <div class="col-3"><button onclick="verMesa(this, '02', 'Ocupada')" class="btn btn-mesa btn-vermelho w-100 py-3 btn-perfil">02</button></div>
                <div class="col-3"><button onclick="verMesa(this, '03', 'Livre')" class="btn btn-mesa btn-outline-dark w-100 py-3 btn-perfil">03</button></div>
                <div class="col-3"><button onclick="verMesa(this, '04', 'Livre')" class="btn btn-mesa btn-outline-dark w-100 py-3 btn-perfil">04</button></div>
            </div>
        </div>

        <div id="detalhe-mesa" class="card card-sistema p-3 d-none">
            <h5>Mesa <span id="num-mesa">--</span> <span id="status-badge" class="badge ms-2"></span></h5>
            <hr>
            <div id="itens-pedido" class="mb-3">
                </div>
            <button class="btn btn-amarelo btn-perfil w-100 mb-2">+ Adicionar Item</button>
            <button class="btn btn-verde btn-perfil w-100">Confirmar Pedido</button>
        </div>
    </div>

    <script>
        function verMesa(elemento, num, status) {
            // FEEDBACK VISUAL: Remove destaque de todos e coloca no atual
            document.querySelectorAll('.btn-mesa').forEach(btn => btn.classList.remove('mesa-selecionada'));
            elemento.classList.add('mesa-selecionada');

            // LÓGICA: Mostra o painel e atualiza textos
            document.getElementById('detalhe-mesa').classList.remove('d-none');
            document.getElementById('num-mesa').innerText = num;
            
            const badge = document.getElementById('status-badge');
            badge.innerText = status;
            badge.className = status === 'Livre' ? 'badge bg-success' : 'badge bg-danger';
            
            const itens = document.getElementById('itens-pedido');
            itens.innerHTML = status === 'Ocupada' ? 
                '<p>1x X-Burger Clássico<br><small>1x Coca-Cola 350ml</small></p>' : 
                '<p class="text-muted">Mesa vazia. Pronta para novo pedido.</p>';
        }
    </script>
</body>
</html>
